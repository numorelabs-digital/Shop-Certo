name: Quality
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: firebase-web/package-lock.json
      - run: npm ci
        working-directory: firebase-web
      - run: npm run build
        working-directory: firebase-web
