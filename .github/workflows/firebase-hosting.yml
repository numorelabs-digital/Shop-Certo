name: Deploy Firebase Hosting
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHOPCERTO }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: firebase-web/package-lock.json
      - run: npm ci
        working-directory: firebase-web
      - run: npm run build
        working-directory: firebase-web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          projectId: shopcerto
          channelId: live
