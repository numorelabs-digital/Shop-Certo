name: Deploy Firebase Hosting
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: firebase-web/package-lock.json
      - run: npm ci
        working-directory: firebase-web
      - run: npm run build
        working-directory: firebase-web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHOPCERTO }}
          projectId: shopcerto
          channelId: live
